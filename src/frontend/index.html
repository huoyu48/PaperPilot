<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaperPilot · AI 科研助手</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f7f8;
    --bg-sidebar: #efeff1;
    --bg-hover: #e8e8ed;
    --bg-active: #dcdce2;
    --bg-bubble-user: #e9e9ef;
    --bg-bubble-ai: transparent;
    --text: #0f0f17;
    --text-secondary: #3c3c4a;
    --text-muted: #8b8b9e;
    --border: #d4d4de;
    --accent: #6d5bd0;
    --accent-hover: #5a48b8;
    --success: #16a34a;
    --error: #dc2626;
    --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    --mono: "SF Mono", "Fira Code", "JetBrains Mono", monospace;
  }
  body {
    font-family: var(--font); background: var(--bg); color: var(--text);
    height: 100vh; display: flex; overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Sidebar ──────────────────────── */
  .sidebar {
    width: 260px; flex-shrink: 0; background: var(--bg-sidebar);
    display: flex; flex-direction: column; border-right: 1px solid var(--border);
  }
  .sidebar-header {
    padding: 12px 14px; display: flex; align-items: center; gap: 10px;
  }
  .sidebar-logo {
    width: 28px; height: 28px; border-radius: 7px;
    background: var(--accent); display: flex; align-items: center; justify-content: center;
  }
  .sidebar-logo svg { width: 16px; height: 16px; fill: white; }
  .sidebar-brand { font-size: 15px; font-weight: 600; color: var(--text); }
  .btn-new {
    margin: 4px 14px 10px; padding: 9px 14px; background: transparent;
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-size: 13px; font-weight: 500;
    cursor: pointer; display: flex; align-items: center; gap: 8px;
    transition: background 0.15s;
  }
  .btn-new:hover { background: var(--bg-hover); }
  .btn-new svg { width: 16px; height: 16px; stroke: var(--text-secondary); fill: none; stroke-width: 2; }

  .sidebar-section-label {
    padding: 8px 16px 6px; font-size: 11px; font-weight: 600;
    color: var(--text-muted); letter-spacing: 0.3px;
  }
  .history-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
  .history-empty { color: var(--text-muted); font-size: 13px; text-align: center; padding: 32px 0; }
  .history-item {
    padding: 10px 12px; border-radius: 8px; margin-bottom: 2px;
    cursor: pointer; transition: background 0.15s; position: relative;
  }
  .history-item:hover { background: var(--bg-hover); }
  .history-item.active { background: var(--bg-active); }
  .history-item-title {
    font-size: 13px; color: var(--text); font-weight: 400;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .history-item-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  .history-item .del-btn {
    position: absolute; top: 8px; right: 8px; width: 24px; height: 24px;
    background: var(--bg-hover); border: none; color: var(--text-muted);
    cursor: pointer; font-size: 14px; display: none; border-radius: 6px;
    transition: all 0.15s; line-height: 24px; text-align: center;
  }
  .history-item:hover .del-btn { display: block; }
  .history-item .del-btn:hover { background: var(--error); color: white; }

  .sidebar-bottom {
    padding: 10px 14px; border-top: 1px solid var(--border);
  }
  .upload-btn {
    padding: 10px 14px; border: 1px dashed var(--border); border-radius: 10px;
    text-align: center; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .upload-btn:hover { background: var(--bg-hover); border-color: var(--text-muted); }
  .upload-btn svg { width: 16px; height: 16px; stroke: var(--text-muted); fill: none; stroke-width: 2; }
  .upload-btn-text { font-size: 12px; color: var(--text-muted); }

  /* ── Main ─────────────────────────── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

  /* Header pipeline */
  .header-bar {
    padding: 10px 24px; display: flex; align-items: center; justify-content: center; gap: 4px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .step-badge {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 14px; font-size: 12px; font-weight: 500;
    color: var(--text-muted); border-radius: 16px;
    transition: all 0.3s; white-space: nowrap;
  }
  .step-badge svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
  .step-badge.active { color: var(--accent); background: rgba(109,91,208,0.12); }
  .step-badge.done { color: var(--success); }
  .step-connector { width: 20px; height: 1px; background: var(--border); flex-shrink: 0; }

  /* Chat */
  .chat-area {
    flex: 1; overflow-y: auto; padding: 24px 0;
    display: flex; flex-direction: column; gap: 24px;
  }

  .message {
    max-width: 720px; width: 100%; margin: 0 auto; padding: 0 24px;
    animation: msgIn 0.25s ease-out;
  }
  @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .message.user { }
  .message.assistant { }

  .msg-role {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  }
  .msg-role-icon {
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .message.user .msg-role-icon { background: var(--accent); }
  .message.user .msg-role-icon svg { width: 12px; height: 12px; fill: white; }
  .message.assistant .msg-role-icon {
    background: transparent; border: 1.5px solid var(--border);
  }
  .message.assistant .msg-role-icon svg { width: 14px; height: 14px; stroke: var(--text-secondary); fill: none; stroke-width: 2; }
  .msg-role-name { font-size: 13px; font-weight: 600; color: var(--text); }

  .bubble {
    font-size: 15px; line-height: 1.7; color: var(--text);
    padding-left: 32px;
  }
  .message.user .bubble { font-weight: 400; }

  .followup-badge {
    display: inline-block; padding: 1px 7px; background: var(--bg-active);
    border-radius: 4px; font-size: 10px; color: var(--text-muted);
    margin-bottom: 4px; font-weight: 500;
  }

  /* Welcome */
  .welcome-card {
    max-width: 640px; width: 100%; margin: 80px auto 0; padding: 0 24px;
    text-align: center; animation: msgIn 0.4s ease-out;
  }
  .welcome-logo {
    width: 48px; height: 48px; border-radius: 12px; margin: 0 auto 20px;
    background: var(--accent); display: flex; align-items: center; justify-content: center;
  }
  .welcome-logo svg { width: 24px; height: 24px; fill: white; }
  .welcome-title { font-size: 28px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .welcome-sub { font-size: 15px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 36px; }
  .feature-row { display: flex; gap: 12px; justify-content: center; }
  .feature-card {
    flex: 1; max-width: 180px; padding: 18px 16px;
    border: 1px solid var(--border); border-radius: 12px;
    transition: background 0.15s; cursor: default;
  }
  .feature-card:hover { background: var(--bg-hover); }
  .feature-card-icon { font-size: 24px; margin-bottom: 10px; }
  .feature-card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .feature-card-desc { font-size: 11px; color: var(--text-muted); line-height: 1.5; }

  /* Session header */
  .session-header {
    max-width: 720px; width: 100%; margin: 0 auto 4px; padding: 10px 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .session-header-query { font-weight: 600; font-size: 14px; color: var(--text); }
  .session-header-meta { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }

  /* Input */
  .input-area { padding: 12px 0 20px; }
  .input-wrap {
    max-width: 720px; margin: 0 auto; padding: 0 24px;
    display: flex; gap: 8px; align-items: flex-end;
  }
  .input-box {
    flex: 1; background: var(--bg-bubble-user); border: 1px solid var(--border);
    border-radius: 16px; padding: 12px 16px; display: flex; align-items: center;
    transition: border-color 0.15s;
  }
  .input-box:focus-within { border-color: var(--text-muted); }
  .input-field {
    flex: 1; background: transparent; border: none;
    color: var(--text); font-size: 15px; outline: none; font-family: var(--font);
  }
  .input-field::placeholder { color: var(--text-muted); }
  .btn-send {
    width: 36px; height: 36px; border-radius: 50%; border: none;
    background: var(--text); display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  }
  .btn-send svg { width: 16px; height: 16px; fill: var(--bg); }
  .btn-send:hover:not(:disabled) { background: var(--accent); }
  .btn-send:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-stop {
    width: 36px; height: 36px; border-radius: 50%; border: none;
    background: var(--error); display: none; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  }
  .btn-stop svg { width: 14px; height: 14px; fill: white; }
  .btn-stop:hover { opacity: 0.8; }

  /* Thinking block (collapsible) */
  .thinking-block {
    border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
    margin-top: 4px;
  }
  .thinking-header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; cursor: pointer; user-select: none;
    transition: background 0.15s;
  }
  .thinking-header:hover { background: var(--bg-hover); }
  .thinking-chevron {
    width: 14px; height: 14px; stroke: var(--text-muted); fill: none; stroke-width: 2;
    transition: transform 0.2s; flex-shrink: 0;
  }
  .thinking-block.expanded .thinking-chevron { transform: rotate(90deg); }
  .thinking-title { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
  .thinking-count { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }
  .thinking-body { display: none; padding: 0 14px 12px; }
  .thinking-block.expanded .thinking-body { display: block; }
  .thinking-body .thinking-item {
    padding: 6px 0; font-size: 13px; line-height: 1.6; color: var(--text-secondary);
    border-top: 1px solid var(--border);
  }
  .thinking-body .thinking-item:first-child { border-top: none; }

  /* Report */
  .report-content { line-height: 1.8; }
  .report-content h1 { font-size: 22px; margin: 24px 0 12px; font-weight: 700; color: var(--text); }
  .report-content h2 { font-size: 17px; margin: 20px 0 10px; font-weight: 600; color: var(--text); }
  .report-content h3 { font-size: 15px; margin: 16px 0 6px; font-weight: 600; color: var(--text); }
  .report-content p { margin: 10px 0; color: var(--text-secondary); }
  .report-content ul, .report-content ol { margin: 10px 0; padding-left: 24px; }
  .report-content li { margin: 4px 0; color: var(--text-secondary); }
  .report-content strong { color: var(--text); font-weight: 600; }
  .report-content a { color: var(--accent); text-decoration: none; }
  .report-content a:hover { text-decoration: underline; }
  .report-content code {
    background: var(--bg-active); padding: 2px 6px; border-radius: 4px;
    font-family: var(--mono); font-size: 13px; color: var(--text);
  }

  /* Loading */
  .loading-wrap { display: flex; align-items: center; gap: 10px; }
  .loading-dots { display: flex; gap: 4px; }
  .loading-dots span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted);
    animation: dotPulse 1.2s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes dotPulse { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }
  .timer-display { color: var(--text-muted); font-size: 12px; font-family: var(--mono); }

  /* Sub-queries */
  .sub-queries { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .sub-query-tag {
    padding: 4px 10px; border-radius: 6px; font-size: 11px;
    color: var(--text-muted); background: var(--bg-active);
    font-family: var(--mono);
  }
  .sub-query-tag.executed { color: var(--success); background: rgba(22,163,74,0.1); }

  /* Done card */
  .done-card {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; border-radius: 10px;
    background: rgba(22,163,74,0.08); border: 1px solid rgba(22,163,74,0.2);
    font-size: 13px; color: var(--success);
  }
  .done-card svg { width: 16px; height: 16px; stroke: var(--success); fill: none; stroke-width: 2; flex-shrink: 0; }
  .done-meta { color: var(--text-muted); font-size: 11px; font-family: var(--mono); margin-left: 4px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Nav dots */
  .chat-nav {
    position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 8px; z-index: 10;
    max-height: 60vh; overflow-y: auto;
  }
  .chat-nav:empty { display: none; }
  .chat-nav-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--border);
    border: none; cursor: pointer; transition: all 0.2s; flex-shrink: 0; opacity: 0.5;
  }
  .chat-nav-dot:hover { opacity: 1; background: var(--accent); }
  .chat-nav-dot.active { opacity: 1; background: var(--accent); }
  #nav-tooltip {
    position: fixed; z-index: 100; background: white;
    color: var(--text); border: 1px solid var(--border);
    padding: 6px 12px; border-radius: 8px; font-size: 12px;
    max-width: 280px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    pointer-events: none; opacity: 0; transition: opacity 0.15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  #nav-tooltip.visible { opacity: 1; }
</style>
</head>
<body>
<div id="nav-tooltip"></div>

<div class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
    <span class="sidebar-brand">PaperPilot</span>
  </div>
  <button class="btn-new" onclick="newResearch()">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    新研究
  </button>
  <div class="sidebar-section-label">历史记录</div>
  <div class="history-list" id="history-list">
    <div class="history-empty">暂无历史记录</div>
  </div>
  <div class="sidebar-bottom">
    <div class="upload-btn" onclick="document.getElementById('file-input').click()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="upload-btn-text">上传文档</span>
      <input type="file" id="file-input" accept=".pdf,.txt,.md,.docx" style="display:none">
    </div>
  </div>
</div>

<div class="main">
  <div class="header-bar">
    <div class="step-badge" data-step="planner"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M3 9h18"/></svg>规划</div>
    <div class="step-connector"></div>
    <div class="step-badge" data-step="researcher"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>研究</div>
    <div class="step-connector"></div>
    <div class="step-badge" data-step="writer"><svg viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>撰写</div>
    <div class="step-connector"></div>
    <div class="step-badge" data-step="reviewer"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>审核</div>
  </div>

  <div class="chat-area" id="chat-area">
    <div class="welcome-card">
      <div class="welcome-logo"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
      <div class="welcome-title">有什么可以帮你的？</div>
      <div class="welcome-sub">输入研究问题，我会检索学术论文、代码仓库和网络资源，生成带引用的研究报告。</div>
      <div class="feature-row">
        <div class="feature-card">
          <div class="feature-card-icon">🔬</div>
          <div class="feature-card-title">多源检索</div>
          <div class="feature-card-desc">Arxiv · GitHub · 网页</div>
        </div>
        <div class="feature-card">
          <div class="feature-card-icon">📄</div>
          <div class="feature-card-title">文档理解</div>
          <div class="feature-card-desc">上传 PDF 即可提问</div>
        </div>
        <div class="feature-card">
          <div class="feature-card-icon">💬</div>
          <div class="feature-card-title">连续追问</div>
          <div class="feature-card-desc">上下文记忆对话</div>
        </div>
      </div>
    </div>
  </div>
  <div class="chat-nav" id="chat-nav"></div>
  <div class="input-area">
    <div class="input-wrap">
      <div class="input-box">
        <input type="text" id="query-input" class="input-field" placeholder="输入研究问题..." autofocus>
      </div>
      <button id="research-btn" class="btn-send" onclick="startResearch()">
        <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
      <button id="stop-btn" class="btn-stop" onclick="stopResearch()">
        <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let ws = null;
let currentSessionId = null;
let timerInterval = null;
let timerStart = 0;
let conversationHistory = [];
let lastReportText = '';
let turnAnchors = [];
let processBlock = null;
let processStepCount = 0;
let streamingReport = '';
let streamingEl = null;

const USER_AV = '<svg viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>';
const AI_AV = '<svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>';
const CHEVRON_SVG = '<svg class="thinking-chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>';

function ensureProcessBlock() {
  if (processBlock) return processBlock;
  const chat = document.getElementById('chat-area');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message assistant';
  const avatar = AI_AV;
  msgDiv.innerHTML = `<div class="msg-role"><div class="msg-role-icon">${avatar}</div><span class="msg-role-name">PaperPilot</span></div><div class="bubble"><div class="thinking-block expanded"><div class="thinking-header" onclick="this.parentElement.classList.toggle('expanded')">${CHEVRON_SVG}<span class="thinking-title">思考中...</span><span class="thinking-count">0 步</span></div><div class="thinking-body"></div></div></div>`;
  chat.appendChild(msgDiv);
  processBlock = msgDiv.querySelector('.thinking-block');
  processStepCount = 0;
  return processBlock;
}

function addProcessItem(html) {
  const block = ensureProcessBlock();
  const body = block.querySelector('.thinking-body');
  const item = document.createElement('div');
  item.className = 'thinking-item';
  item.innerHTML = html;
  body.appendChild(item);
  processStepCount++;
  block.querySelector('.thinking-count').textContent = `${processStepCount} 步`;
  const chat = document.getElementById('chat-area');
  chat.scrollTop = chat.scrollHeight;
}

// ─── Chat Navigation ──────────────────────
let tooltipTimer = null;
function addNavDot(query, msgEl) {
  const nav = document.getElementById('chat-nav');
  const dot = document.createElement('div');
  dot.className = 'chat-nav-dot';
  const tooltip = document.getElementById('nav-tooltip');
  dot.addEventListener('mouseenter', () => {
    clearTimeout(tooltipTimer);
    tooltip.textContent = query.length > 40 ? query.substring(0, 40) + '…' : query;
    const rect = dot.getBoundingClientRect();
    tooltip.style.top = (rect.top - 36) + 'px';
    tooltip.style.left = (rect.left + rect.width / 2) + 'px';
    tooltip.style.right = 'auto';
    tooltip.style.transform = 'translateX(-50%)';
    tooltip.classList.add('visible');
  });
  dot.addEventListener('mouseleave', () => {
    tooltipTimer = setTimeout(() => tooltip.classList.remove('visible'), 100);
  });
  dot.onclick = () => {
    tooltip.classList.remove('visible');
    msgEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };
  nav.appendChild(dot);
  turnAnchors.push({ el: msgEl, query, dot });
}
function clearNav() {
  document.getElementById('chat-nav').innerHTML = '';
  turnAnchors = [];
}
document.addEventListener('DOMContentLoaded', () => {
  const chat = document.getElementById('chat-area');
  chat.addEventListener('scroll', () => {
    const chatRect = chat.getBoundingClientRect();
    let activeIdx = 0;
    for (let i = 0; i < turnAnchors.length; i++) {
      const rect = turnAnchors[i].el.getBoundingClientRect();
      if (rect.top <= chatRect.top + 100) activeIdx = i;
    }
    turnAnchors.forEach((a, i) => a.dot.classList.toggle('active', i === activeIdx));
  });
});

// ─── Timer ─────────────────────────────────
function startTimer() {
  timerStart = Date.now();
  timerInterval = setInterval(() => {
    // Update the last .timer-display element (there may be multiple loading items in DOM)
    const els = document.querySelectorAll('.timer-display');
    if (els.length > 0) els[els.length - 1].textContent = formatElapsed();
  }, 1000);
}
function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
function formatElapsed() {
  const s = Math.floor((Date.now() - timerStart) / 1000);
  return s >= 60 ? `${Math.floor(s/60)}分${s%60}秒` : `${s}秒`;
}

// ─── Input ─────────────────────────────────
document.getElementById('query-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); startResearch(); }
});

// ─── Start Research ────────────────────────
function startResearch() {
  const input = document.getElementById('query-input');
  const query = input.value.trim();
  if (!query) return;
  input.value = '';
  document.getElementById('research-btn').style.display = 'none';
  document.getElementById('stop-btn').style.display = 'flex';
  const welcome = document.querySelector('.welcome-card');
  if (welcome) welcome.remove();

  addMessage('user', query);
  addNavDot(query, document.querySelector('.message.user:last-child'));
  conversationHistory.push({ role: 'user', content: query });

  processBlock = null;
  processStepCount = 0;
  streamingEl = null;
  streamingReport = '';
  resetSteps();
  startTimer();
  addProcessItem(`<div class="loading-wrap"><div class="loading-dots"><span></span><span></span><span></span></div><span>正在启动研究流程...</span><span class="timer-display">0秒</span></div>`);

  const payload = { query, conversation_history: conversationHistory.slice(0, -1) };
  if (currentSessionId) payload.session_id = currentSessionId;

  const wsUrl = `ws://${location.host}/ws/research`;
  ws = new WebSocket(wsUrl);
  ws.onopen = () => ws.send(JSON.stringify(payload));
  ws.onmessage = (e) => handleWSEvent(JSON.parse(e.data));
  ws.onerror = () => { addMessage('assistant', 'WebSocket 连接失败，切换到 HTTP 模式...'); fallbackHTTP(payload); };
  ws.onclose = () => { ws = null; };
}

function stopResearch() {
  if (ws) { ws.close(); ws = null; }
  stopTimer();
  document.getElementById('research-btn').style.display = 'flex';
  document.getElementById('stop-btn').style.display = 'none';
  document.getElementById('research-btn').disabled = false;
  if (processBlock) {
    processBlock.classList.remove('expanded');
    const titleEl = processBlock.querySelector('.thinking-title');
    if (titleEl) titleEl.textContent = '已停止';
    const lastLoad = processBlock.querySelector('.loading-wrap');
    if (lastLoad) lastLoad.closest('.thinking-item')?.remove();
  }
  addMessage('assistant', '<span style="color:var(--error)">研究已停止</span>', false);
  processBlock = null;
  streamingEl = null;
  streamingReport = '';
}

// ─── WebSocket Events ──────────────────────
function handleWSEvent(msg) {
  const chat = document.getElementById('chat-area');
  switch (msg.event) {
    case 'session_start':
      currentSessionId = msg.data.session_id;
      break;
    case 'node_start': {
      const html = `<div class="loading-wrap"><div class="loading-dots"><span></span><span></span><span></span></div><span>${msg.data.message}</span><span class="timer-display">${formatElapsed()}</span></div>`;
      // Update last item if it's a loading item, otherwise add new
      const body = processBlock?.querySelector('.thinking-body');
      const lastItem = body?.querySelector('.thinking-item:last-child');
      if (lastItem && lastItem.querySelector('.loading-wrap')) {
        lastItem.innerHTML = html;
      } else {
        addProcessItem(html);
      }
      break;
    }
    case 'node_complete': {
      activateStep(msg.data.node);
      const stepNames = { planner: '规划', researcher: '研究', writer: '撰写', reviewer: '审核' };
      const name = stepNames[msg.data.node] || msg.data.node;
      // Find the LAST loading item (not just last child — plan/results may have added items after it)
      const body = processBlock?.querySelector('.thinking-body');
      const allItems = body?.querySelectorAll('.thinking-item');
      let lastLoading = null;
      if (allItems) {
        for (const item of allItems) {
          if (item.querySelector('.loading-wrap')) lastLoading = item;
        }
      }
      if (lastLoading) {
        lastLoading.innerHTML = `<span style="color:var(--success)">✓</span> ${name}完成 · ${formatElapsed()}`;
      } else {
        addProcessItem(`<span style="color:var(--success)">✓</span> ${name}完成`);
      }
      break;
    }
    case 'plan': {
      const tags = msg.data.map(sq =>
        `<span class="sub-query-tag">${sq.tool}: ${sq.question.substring(0, 50)}</span>`
      ).join('');
      addProcessItem(`<strong>研究计划</strong><div class="sub-queries">${tags}</div>`);
      break;
    }
    case 'results':
      addProcessItem(`已收集 <strong>${msg.data.count}</strong> 条研究结果`);
      break;
    case 'report_chunk': {
      // First chunk: collapse thinking block and create report area
      if (!streamingEl) {
        if (processBlock) {
          processBlock.classList.remove('expanded');
          const titleEl = processBlock.querySelector('.thinking-title');
          if (titleEl) titleEl.textContent = '已完成';
          const lastLoad = processBlock.querySelector('.loading-wrap');
          if (lastLoad) lastLoad.closest('.thinking-item')?.remove();
        }
        streamingReport = '';
        streamingEl = addMessage('assistant', '<div class="report-content"></div>', false);
        streamingEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
      streamingReport += msg.data;
      // Throttle re-rendering to avoid lag
      if (!streamingEl._renderPending) {
        streamingEl._renderPending = true;
        requestAnimationFrame(() => {
          const content = streamingEl.querySelector('.report-content');
          if (content) content.innerHTML = renderMarkdown(streamingReport);
          streamingEl._renderPending = false;
        });
      }
      break;
    }
    case 'done':
      stopTimer();
      completeAllSteps();
      document.getElementById('research-btn').style.display = 'flex';
      document.getElementById('stop-btn').style.display = 'none';
      document.getElementById('research-btn').disabled = false;
      // Collapse the thinking block
      if (processBlock) {
        processBlock.classList.remove('expanded');
        const titleEl = processBlock.querySelector('.thinking-title');
        if (titleEl) titleEl.textContent = '已完成';
        const timerEl = processBlock.querySelector('.timer-display');
        if (timerEl) timerEl.textContent = formatElapsed();
        const lastLoad = processBlock.querySelector('.loading-wrap');
        if (lastLoad) lastLoad.closest('.thinking-item')?.remove();
      }
      if (msg.data.report) {
        conversationHistory.push({ role: 'assistant', content: '', report: msg.data.report });
        lastReportText = msg.data.report;
        // If streaming was used, finalize render; otherwise showReport
        if (streamingEl) {
          const content = streamingEl.querySelector('.report-content');
          if (content) content.innerHTML = renderMarkdown(msg.data.report);
          streamingEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else {
          showReport(msg.data.report);
        }
        addMessage('assistant', `<div class="done-card"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span>研究完成</span><span class="done-meta">${formatElapsed()} · ${msg.data.report_path}</span></div>`, false);
      } else {
        addMessage('assistant', `<div class="done-card"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><span>研究完成 · ${formatElapsed()}</span></div>`);
      }
      currentSessionId = msg.data.session_id;
      loadHistory();
      processBlock = null;
      streamingEl = null;
      streamingReport = '';
      break;
    case 'error':
      stopTimer();
      document.getElementById('research-btn').style.display = 'flex';
      document.getElementById('stop-btn').style.display = 'none';
      document.getElementById('research-btn').disabled = false;
      if (processBlock) processBlock.classList.remove('expanded');
      addMessage('assistant', `<span style="color:var(--error)">错误：${msg.data}</span>`);
      processBlock = null;
      break;
  }
  if (msg.event !== 'done') {
    chat.scrollTop = chat.scrollHeight;
  }
}

async function fallbackHTTP(payload) {
  try {
    const res = await fetch(`${API}/api/research`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload),
    });
    const data = await res.json();
    stopTimer();
    if (data.status === 'completed') {
      completeAllSteps();
      currentSessionId = data.session_id;
      const status = await fetch(`${API}/api/sessions/${data.session_id}`).then(r => r.json());
      if (status.report) showReport(status.report);
      addMessage('assistant', `<div class="done-card"><span>研究完成 · ${formatElapsed()}</span></div>`);
      loadHistory();
    } else {
      addMessage('assistant', `<span style="color:var(--error)">${data.message}</span>`);
    }
  } catch (err) {
    stopTimer();
    addMessage('assistant', `<span style="color:var(--error)">请求失败：${err.message}</span>`);
  }
  document.getElementById('research-btn').style.display = 'flex';
  document.getElementById('stop-btn').style.display = 'none';
  document.getElementById('research-btn').disabled = false;
}

// ─── History ───────────────────────────────
async function loadHistory() {
  try {
    const res = await fetch(`${API}/api/sessions`);
    const sessions = await res.json();
    const list = document.getElementById('history-list');
    if (!sessions.length) { list.innerHTML = '<div class="history-empty">暂无历史记录</div>'; return; }
    list.innerHTML = sessions.map(s => `
      <div class="history-item${s.id===currentSessionId?' active':''}" data-id="${s.id}" onclick="loadSession('${s.id}')">
        <div class="history-item-title">${escHtml(s.query)}</div>
        <div class="history-item-meta">${s.created_at}</div>
        <button class="del-btn" onclick="event.stopPropagation();deleteSession('${s.id}')" title="删除">×</button>
      </div>
    `).join('');
  } catch (e) { console.error('loadHistory:', e); }
}

async function loadSession(id) {
  try {
    const res = await fetch(`${API}/api/sessions/${id}`);
    const s = await res.json();
    if (s.error) return;
    currentSessionId = s.id;
    const chat = document.getElementById('chat-area');
    chat.innerHTML = '';
    clearNav();
    resetSteps();
    completeAllSteps();

    conversationHistory = [{ role: 'user', content: s.query }];
    if (s.report) conversationHistory.push({ role: 'assistant', content: '', report: s.report });

    const header = document.createElement('div');
    header.className = 'session-header';
    header.innerHTML = `<span class="session-header-query">${escHtml(s.query)}</span><span class="session-header-meta">${s.created_at}</span>`;
    chat.appendChild(header);

    addMessage('user', s.query);
    addNavDot(s.query, document.querySelector('.message.user:last-child'));
    if (s.sub_queries && s.sub_queries.length) {
      processBlock = null;
      processStepCount = 0;
      const tags = s.sub_queries.map(sq =>
        `<span class="sub-query-tag executed">${sq.tool}: ${sq.question.substring(0,50)}</span>`
      ).join('');
      addProcessItem(`<strong>研究计划</strong><div class="sub-queries">${tags}</div>`);
      if (processBlock) processBlock.classList.remove('expanded');
      processBlock = null;
    }
    if (s.report) showReport(s.report);

    if (s.followups) {
      for (const f of s.followups) {
        conversationHistory.push({ role: 'user', content: f.query });
        addMessage('user', `<span class="followup-badge">追问</span> ${escHtml(f.query)}`);
        addNavDot(f.query, document.querySelector('.message.user:last-child'));
        if (f.report) {
          showReport(f.report);
          conversationHistory.push({ role: 'assistant', content: '', report: f.report });
        }
      }
    }
    document.querySelectorAll('.history-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === id);
    });
    document.getElementById('query-input').placeholder = '继续追问这个课题...';
    chat.scrollTop = chat.scrollHeight;
  } catch (e) { console.error('loadSession:', e); }
}

async function deleteSession(id) {
  if (!confirm('确定删除这条记录？')) return;
  await fetch(`${API}/api/sessions/${id}`, { method: 'DELETE' });
  if (currentSessionId === id) { currentSessionId = null; newResearch(); }
  loadHistory();
}

function newResearch() {
  currentSessionId = null;
  conversationHistory = [];
  lastReportText = '';
  processBlock = null;
  processStepCount = 0;
  streamingEl = null;
  streamingReport = '';
  clearNav();
  const chat = document.getElementById('chat-area');
  chat.innerHTML = `
    <div class="welcome-card">
      <div class="welcome-logo"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
      <div class="welcome-title">有什么可以帮你的？</div>
      <div class="welcome-sub">输入研究问题，我会检索学术论文、代码仓库和网络资源，生成带引用的研究报告。</div>
      <div class="feature-row">
        <div class="feature-card"><div class="feature-card-icon">🔬</div><div class="feature-card-title">多源检索</div><div class="feature-card-desc">Arxiv · GitHub · 网页</div></div>
        <div class="feature-card"><div class="feature-card-icon">📄</div><div class="feature-card-title">文档理解</div><div class="feature-card-desc">上传 PDF 即可提问</div></div>
        <div class="feature-card"><div class="feature-card-icon">💬</div><div class="feature-card-title">连续追问</div><div class="feature-card-desc">上下文记忆对话</div></div>
      </div>
    </div>`;
  resetSteps();
  document.getElementById('query-input').placeholder = '输入研究问题...';
  document.getElementById('query-input').focus();
  document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
}

// ─── File Upload ───────────────────────────
document.getElementById('file-input').addEventListener('change', uploadFile);
const uploadBtn = document.querySelector('.upload-btn');
uploadBtn.addEventListener('dragover', (e) => { e.preventDefault(); uploadBtn.style.borderColor='var(--text-muted)'; });
uploadBtn.addEventListener('dragleave', () => { uploadBtn.style.borderColor=''; });
uploadBtn.addEventListener('drop', (e) => {
  e.preventDefault(); uploadBtn.style.borderColor='';
  if (e.dataTransfer.files.length) uploadFile({target:{files:e.dataTransfer.files}});
});
async function uploadFile(e) {
  const file = e.target.files[0]; if (!file) return;
  const form = new FormData(); form.append('file', file);
  try {
    const res = await fetch(`${API}/api/documents`, { method:'POST', body: form });
    const data = await res.json();
    addMessage('assistant', `文档已上传：<strong>${data.filename}</strong>（已索引 ${data.chunk_count} 个文本块）`);
  } catch (err) {
    addMessage('assistant', `<span style="color:var(--error)">上传失败：${err.message}</span>`);
  }
}

// ─── Helpers ───────────────────────────────
function addMessage(role, content, scroll = true) {
  const chat = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const avatar = role === 'user' ? USER_AV : AI_AV;
  const name = role === 'user' ? '你' : 'PaperPilot';
  div.innerHTML = `<div class="msg-role"><div class="msg-role-icon">${avatar}</div><span class="msg-role-name">${name}</span></div><div class="bubble">${content}</div>`;
  chat.appendChild(div);
  if (scroll) chat.scrollTop = chat.scrollHeight;
  return div;
}

function renderMarkdown(md) {
  return md
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank">$1</a>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
}

function showReport(md) {
  const el = addMessage('assistant', `<div class="report-content">${renderMarkdown(md)}</div>`, false);
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetSteps() { document.querySelectorAll('.step-badge').forEach(s => s.classList.remove('active','done')); }
function activateStep(name) {
  const steps = document.querySelectorAll('.step-badge'); let found = false;
  steps.forEach(s => {
    if (s.dataset.step === name) { s.classList.add('active'); s.classList.remove('done'); found = true; }
    else if (!found) { s.classList.remove('active'); s.classList.add('done'); }
  });
}
function completeAllSteps() { document.querySelectorAll('.step-badge').forEach(s => { s.classList.remove('active'); s.classList.add('done'); }); }

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

loadHistory();
</script>
